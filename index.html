<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Contact List</title>
  </head>

  <body>
    <div
      class="wrapper d-flex align-items-center justify-content-center min-vh-100"
    >
      <div
        class="phone border-3 border rounded-5 border-dark shadow-lg position-relative overflow-y-scroll"
        style="height: 600px; width: 300px"
      >
        <!-- top time and network -->
        <div
          class="topbar d-flex justify-content-between align-items-center text-white"
          style="padding: 10px; height: 50px"
        >
          <span>12:00</span>
          <div class="bg-black w-25 rounded-pill" style="height: 20px"></div>
          <div class="right">
            <i class="bi bi-reception-4"></i>
            <i class="bi bi-wifi"></i>
            <i class="bi bi-battery-half"></i>
          </div>
        </div>
        <!-- homescreen -->

        <main class="homescreen h-100 p-2 position-relative">
          <div
            class="slide-container border border-3 bg-white border-dark p-3 rounded-4 shadow position-relative"
            style="top: 400px"
          >
            <input
              type="range"
              value="0"
              min="0"
              max="100"
              class="slider"
              id="mySlider"
            />
            <label id="label" class="position-absolute text-center w-100"
              >Slide to unock</label
            >
          </div>
        </main>

        <!-- app screen -->

        <main
          class="appscreen bg-dark p-2 pt-5"
          style="height: 550px; display: none"
        >
          <div class="d-flex justify-content-center">
            <div class="d-flex flex-column align-items-center p-2 rounded">
              <i
                class="bi bi-person-rolodex text-danger fs-1 bg-white px-2 rounded"
                onclick="displayContactScreen()"
              ></i>
              <span class="text-white">Contact</span>
            </div>
          </div>
        </main>

        <!-- contact List screen -->

        <main class="contactscreen" style="height: 90%; display: none">
          <div class="contactlistcontainer">
            <!-- title.. -->
            <h2 class="p-2 fw-bolder text-white">Contacts</h2>
            <!-- search -->

            <div class="header mt-2 p-2 position-relative">
              <i
                class="bi bi-search position-absolute fs-4 m-1 text-secondary"
              ></i>
              <input
                type="search"
                id="search"
                class="form-control rounded-pill"
                placeholder="Search contact"
              />
            </div>

            <!-- spinner -->
            <div class="bg-light w-25 rounded m-auto p-3 showSpinner">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>

            <!-- contact-List -->

            <div id="list" class="bg-light pt-2" style="display: none">
              <div class="p-2"><span id="userCount">0</span> contacts</div>

              <div class="accordion mt-2" id="userAccordion"></div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- bootstrap javascrit -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
